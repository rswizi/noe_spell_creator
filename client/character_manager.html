<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NoE - New Character Manager</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #14090c;
      --panel: #121219;
      --border: #252533;
      --accent: #c53535;
      --text: #f3f3f5;
    }
    * { box-sizing: border-box; }
    html, body, #root { min-height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #1a0c0f 0%, #0b0b10 100%);
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    .cm-page { min-height: 100vh; display: grid; place-items: start center; }
    .cm-wrap { width: 100%; max-width: 1120px; padding: 28px 16px 60px; }
    .cm-topbar { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .cm-topbar h1 { margin: 0; font-size: 24px; }
    .cm-right { margin-left: auto; }
    .cm-btn, .cm-card, .cm-menu button, .cm-modal-actions button {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #181821;
      color: var(--text);
      text-decoration: none;
      transition: background .15s ease, border .15s ease, transform .1s ease;
    }
    .cm-btn:hover, .cm-card:hover, .cm-menu button:hover, .cm-modal-actions button:hover {
      background: #1f1f2a; border-color: #2f2f42;
    }
    .cm-btn:active, .cm-card:active, .cm-menu button:active, .cm-modal-actions button:active {
      transform: translateY(1px);
    }
    .cm-primary {
      background: linear-gradient(135deg, rgba(197,53,53,.35), rgba(20,20,29,.9));
      border-color: var(--accent);
      color: #fff;
    }
    .cm-muted { opacity: .82; font-size: .9rem; }
    .cm-error { color: #ff9f9f; font-size: .92rem; }
    .cm-actions { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .cm-menu-wrap { position: relative; }
    .cm-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(0,0,0,.45);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity .15s ease, transform .15s ease;
    }
    .cm-menu.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .cm-menu button { width: 100%; text-align: left; background: transparent; border: none; cursor: pointer; font-weight: 600; }
    .cm-menu button.cm-primary-item {
      background: linear-gradient(135deg, rgba(197,53,53,.5), rgba(20,20,29,.85));
      border: 1px solid var(--accent);
    }
    .cm-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .cm-card {
      display: flex;
      gap: 10px;
      cursor: pointer;
      text-align: left;
      width: 100%;
      background: linear-gradient(135deg, rgba(197,53,53,.15), rgba(12,12,18,.95));
      box-shadow: 0 10px 28px rgba(0,0,0,.28);
    }
    .cm-avatar {
      width: 78px;
      height: 78px;
      border: 1px solid #333;
      border-radius: 12px;
      overflow: hidden;
      background: #0b0b10;
      flex-shrink: 0;
    }
    .cm-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .cm-meta { display: grid; gap: 4px; }
    .cm-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #2f2f3f;
      font-size: .82rem;
    }
    .cm-modal {
      position: fixed;
      inset: 0;
      background: rgba(5,5,8,.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }
    .cm-modal.open { opacity: 1; pointer-events: auto; }
    .cm-modal-panel {
      width: min(700px, 100%);
      max-height: calc(90vh - 32px);
      overflow-y: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 28px;
      box-shadow: 0 20px 45px rgba(0,0,0,.55);
    }
    .cm-modal-panel h2 { margin: 0 0 4px; font-size: 22px; }
    .cm-field-grid { display: grid; gap: 12px; }
    .cm-field-grid label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: .9rem;
      font-weight: 600;
    }
    .cm-field-grid input, .cm-field-grid select {
      background: #1a1a2a;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 1rem;
      width: 100%;
    }
    .cm-modal-actions { margin-top: 8px; display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }
    .cm-tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .cm-tab {
      padding: 9px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #171722;
      color: var(--text);
      cursor: pointer;
    }
    .cm-tab.active {
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(197,53,53,0.26), rgba(17,17,26,0.95));
    }
    .cm-panel {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #101018;
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .cm-panel h2 { margin: 0; font-size: 1rem; }
    .cm-panel label { display: grid; gap: 4px; font-size: .9rem; }
    .cm-panel input,
    .cm-panel select,
    .cm-panel textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      background: #1b1b2a;
      color: var(--text);
    }
    .cm-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .cm-economy-layout {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 12px;
      align-items: start;
    }
    .cm-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }
    .cm-table th,
    .cm-table td {
      border-bottom: 1px solid #242438;
      padding: 8px 6px;
      text-align: left;
      vertical-align: top;
    }
    .cm-table th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.6);
    }
    .cm-table-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .cm-list {
      display: grid;
      gap: 8px;
    }
    .cm-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #2a2a3a;
      background: #15151f;
      cursor: pointer;
    }
    .cm-list-item.active {
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(197,53,53,0.25), rgba(21,21,31,0.95));
    }
    .cm-list-item.cm-list-row {
      cursor: default;
    }
    .cm-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .cm-inline-space {
      justify-content: space-between;
      width: 100%;
    }
    .cm-stack {
      display: grid;
      gap: 6px;
    }
    .cm-badge {
      border-radius: 999px;
      padding: 4px 10px;
      border: 1px solid #2f2f3f;
      font-size: 0.85rem;
      background: #11111a;
    }
    .cm-subtle {
      margin-top: 4px;
    }
    .cm-panel.cm-panel-lite {
      background: #13131d;
      border-color: #26263a;
    }
    .cm-service-form input {
      min-width: 140px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useCallback, useEffect, useMemo, useRef, useState } = React;
    const API_BASE = "";

    const QUALITY_ORDER = ["Adequate","Good","Very Good","Excellent","Legendary","Mythical","Epic","Divine","Unreal"];
    const ARMOR_SLOTS = ["head","accessory","arms","legs","chest"];
    const NATURES = ["Fire","Lightning","Water","Earth","Wind","Sun","Moon","Ki"];
    const FALLBACK_AVATAR = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAusB9WUZPi8AAAAASUVORK5CYII=";
    const ECONOMY_TYPES = ["Manpower (hourly)", "Primary Resource", "Manufactured Resource", "Item"];
    const AVAILABILITIES = ["Very Common","Common","Uncommon","Rare","Very Rare","Legendary","Unique"];
    const MARKUP_BY_AVAILABILITY = {
      "Very Common": 5,
      "Common": 10,
      "Uncommon": 30,
      "Rare": 75,
      "Very Rare": 150,
      "Legendary": 300,
      "Unique": 1000,
    };
    const DEFAULT_AVAILABILITY = "Common";

    function getToken() {
      return localStorage.getItem("auth_token") || "";
    }

    function authHeaders() {
      const token = getToken();
      if (!token) return {};
      return { "Authorization": `Bearer ${token}`, "X-Auth-Token": token };
    }

    async function api(path, options = {}) {
      const headers = { ...(options.headers || {}), ...authHeaders() };
      const response = await fetch(`${API_BASE}${path}`, { credentials: "include", ...options, headers });
      const contentType = response.headers.get("content-type") || "";
      const payload = contentType.includes("application/json")
        ? await response.json()
        : { status: "error", message: await response.text() };
      if (!response.ok || payload.status === "error") {
        throw new Error(payload.message || `HTTP ${response.status}`);
      }
      return payload;
    }

    function sortByName(list) {
      return [...(list || [])].sort((a, b) => String(a?.name || a?.id || "").localeCompare(String(b?.name || b?.id || "")));
    }

    function slugifyCharacterName(name) {
      const normalized = String(name || "")
        .trim()
        .toLowerCase()
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "");
      const slug = normalized
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "")
        .slice(0, 64);
      return slug || "character";
    }

    function characterManagerPath(id, name) {
      const cid = String(id || "").trim();
      if (!cid) return "/character-manager";
      return `/character-manager/${encodeURIComponent(cid)}_${slugifyCharacterName(name || cid)}`;
    }

    function normalizeRole(role) {
      return String(role || "").toLowerCase();
    }

    function isPrivilegedRole(role) {
      return ["admin", "mod", "moderator"].includes(normalizeRole(role));
    }

    function createId() {
      if (typeof crypto !== "undefined" && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return `${Date.now()}_${Math.random().toString(16).slice(2, 8)}`;
    }

    function availabilityRank(value) {
      const idx = AVAILABILITIES.indexOf(value);
      return idx === -1 ? 0 : idx;
    }

    function getRarestAvailability(requirements, entitiesById) {
      let rarest = "";
      let rank = -1;
      for (const entry of requirements) {
        const entity = entitiesById[entry.entityId];
        if (!entity || !entity.availability) continue;
        const currentRank = availabilityRank(entity.availability);
        if (currentRank > rank) {
          rank = currentRank;
          rarest = entity.availability;
        }
      }
      return rarest || DEFAULT_AVAILABILITY;
    }

    function EconomyManagerPage() {
      const [me, setMe] = useState({
        label: "Checking login...",
        role: "",
        isAdmin: false,
        isPrivileged: false,
      });
      const [tab, setTab] = useState("configure");
      const [entities, setEntities] = useState([]);
      const [entityForm, setEntityForm] = useState({
        id: "",
        name: "",
        type: ECONOMY_TYPES[0],
        valuePerUnit: "",
        availability: AVAILABILITIES[0],
      });
      const [entityError, setEntityError] = useState("");
      const [services, setServices] = useState([]);
      const [serviceFormOpen, setServiceFormOpen] = useState(false);
      const [serviceForm, setServiceForm] = useState({ name: "", fixedPrice: "" });
      const [dynamicMeta, setDynamicMeta] = useState({});
      const [selectedDynamicId, setSelectedDynamicId] = useState("");
      const [dynamicSearch, setDynamicSearch] = useState("");
      const [dynamicFilter, setDynamicFilter] = useState("all");
      const [requirementDraft, setRequirementDraft] = useState({ entityId: "", quantity: 1 });

      useEffect(() => {
        let active = true;
        api("/auth/me")
          .then((meData) => {
            if (!active) return;
            const role = meData.role || "";
            const isAdmin = normalizeRole(role) === "admin";
            setMe({
              label: `${meData.username || "Unknown"} (${role || "user"})`,
              role,
              isAdmin,
              isPrivileged: isPrivilegedRole(role),
            });
          })
          .catch(() => {
            if (!active) return;
            setMe({ label: "Not logged in", role: "", isAdmin: false, isPrivileged: false });
          });
        return () => {
          active = false;
        };
      }, []);

      const entitiesById = useMemo(() => {
        const map = {};
        entities.forEach((entity) => {
          map[entity.id] = entity;
        });
        return map;
      }, [entities]);

      const catalogItems = useMemo(() => {
        return entities
          .filter((entity) => entity.type === "Item")
          .map((entity) => ({
            id: entity.id,
            name: entity.name,
            type: "Item",
            fixedPrice: Number(entity.valuePerUnit) || 0,
          }));
      }, [entities]);

      const dynamicEntries = useMemo(() => {
        return [
          ...catalogItems,
          ...services.map((service) => ({
            id: service.id,
            name: service.name,
            type: "Service",
            fixedPrice: Number(service.fixedPrice) || 0,
          })),
        ];
      }, [catalogItems, services]);

      const filteredDynamicEntries = useMemo(() => {
        const query = String(dynamicSearch || "").toLowerCase();
        return dynamicEntries.filter((entry) => {
          if (dynamicFilter !== "all" && entry.type !== dynamicFilter) return false;
          if (!query) return true;
          return String(entry.name || "").toLowerCase().includes(query);
        });
      }, [dynamicEntries, dynamicFilter, dynamicSearch]);

      const selectedEntry = dynamicEntries.find((entry) => entry.id === selectedDynamicId) || null;
      const selectedMeta = selectedEntry ? dynamicMeta[selectedEntry.id] || null : null;

      useEffect(() => {
        if (!selectedEntry) return;
        setDynamicMeta((prev) => {
          if (prev[selectedEntry.id]) return prev;
          return {
            ...prev,
            [selectedEntry.id]: {
              requirements: [],
              availability: "",
              markupPct: "",
            },
          };
        });
      }, [selectedEntry]);

      const requirementOptions = useMemo(() => {
        return entities
          .filter((entity) => ECONOMY_TYPES.includes(entity.type))
          .map((entity) => ({
            id: entity.id,
            label: `${entity.name} (${entity.type})`,
            availability: entity.availability,
            valuePerUnit: Number(entity.valuePerUnit) || 0,
          }));
      }, [entities]);

      const requirementMap = useMemo(() => {
        const map = {};
        requirementOptions.forEach((entry) => {
          map[entry.id] = entry;
        });
        return map;
      }, [requirementOptions]);

      const defaultAvailability = useMemo(() => {
        if (!selectedMeta) return DEFAULT_AVAILABILITY;
        return getRarestAvailability(selectedMeta.requirements || [], entitiesById);
      }, [entitiesById, selectedMeta]);

      const effectiveAvailability = selectedMeta?.availability || defaultAvailability;
      const defaultMarkupPct = MARKUP_BY_AVAILABILITY[effectiveAvailability] ?? 0;
      const effectiveMarkupPct =
        selectedMeta?.markupPct === "" || selectedMeta?.markupPct === undefined || selectedMeta?.markupPct === null
          ? defaultMarkupPct
          : Number(selectedMeta?.markupPct) || 0;

      const requirementCost = useMemo(() => {
        if (!selectedMeta) return 0;
        return (selectedMeta.requirements || []).reduce((sum, entry) => {
          const source = entitiesById[entry.entityId];
          if (!source) return sum;
          const unit = Number(source.valuePerUnit) || 0;
          const qty = Number(entry.quantity) || 0;
          return sum + unit * qty;
        }, 0);
      }, [entitiesById, selectedMeta]);

      const markupValue = requirementCost * (effectiveMarkupPct / 100);
      const dynamicPrice = Math.round(requirementCost + markupValue);

      function resetEntityForm() {
        setEntityForm({
          id: "",
          name: "",
          type: ECONOMY_TYPES[0],
          valuePerUnit: "",
          availability: AVAILABILITIES[0],
        });
      }

      function handleEntitySubmit(event) {
        event.preventDefault();
        setEntityError("");
        const name = String(entityForm.name || "").trim();
        if (!name) {
          setEntityError("Name is required.");
          return;
        }
        const value = Number(entityForm.valuePerUnit);
        if (Number.isNaN(value)) {
          setEntityError("Value per unit must be a number.");
          return;
        }
        if (entityForm.id) {
          setEntities((prev) =>
            prev.map((entity) =>
              entity.id === entityForm.id
                ? { ...entity, name, type: entityForm.type, valuePerUnit: value, availability: entityForm.availability }
                : entity
            )
          );
        } else {
          const newEntity = {
            id: createId(),
            name,
            type: entityForm.type,
            valuePerUnit: value,
            availability: entityForm.availability,
          };
          setEntities((prev) => [...prev, newEntity]);
        }
        resetEntityForm();
      }

      function handleEntityEdit(entity) {
        setEntityForm({
          id: entity.id,
          name: entity.name,
          type: entity.type,
          valuePerUnit: entity.valuePerUnit,
          availability: entity.availability,
        });
      }

      function handleEntityDelete(entityId) {
        setEntities((prev) => prev.filter((entity) => entity.id !== entityId));
        setDynamicMeta((prev) => {
          if (!prev[entityId]) return prev;
          const next = { ...prev };
          delete next[entityId];
          return next;
        });
        if (selectedDynamicId === entityId) {
          setSelectedDynamicId("");
        }
      }

      function updateSelectedMeta(patch) {
        if (!selectedEntry) return;
        setDynamicMeta((prev) => ({
          ...prev,
          [selectedEntry.id]: { ...prev[selectedEntry.id], ...patch },
        }));
      }

      function handleRequirementAdd(event) {
        event.preventDefault();
        if (!selectedMeta || !selectedEntry) return;
        const entityId = requirementDraft.entityId;
        const qty = Number(requirementDraft.quantity);
        if (!entityId || Number.isNaN(qty) || qty <= 0) {
          return;
        }
        if (selectedMeta.requirements.some((entry) => entry.entityId === entityId)) {
          return;
        }
        updateSelectedMeta({
          requirements: [...selectedMeta.requirements, { entityId, quantity: qty }],
        });
        setRequirementDraft({ entityId: "", quantity: 1 });
      }

      function handleRequirementRemove(entityId) {
        if (!selectedMeta) return;
        updateSelectedMeta({
          requirements: selectedMeta.requirements.filter((entry) => entry.entityId !== entityId),
        });
      }

      function handleFixedPriceChange(value) {
        const nextValue = Number(value);
        if (!selectedEntry) return;
        if (selectedEntry.type === "Item") {
          setEntities((prev) =>
            prev.map((entity) =>
              entity.id === selectedEntry.id ? { ...entity, valuePerUnit: Number.isNaN(nextValue) ? 0 : nextValue } : entity
            )
          );
        } else {
          setServices((prev) =>
            prev.map((service) =>
              service.id === selectedEntry.id ? { ...service, fixedPrice: Number.isNaN(nextValue) ? 0 : nextValue } : service
            )
          );
        }
      }

      function handleCreateService(event) {
        event.preventDefault();
        const name = String(serviceForm.name || "").trim();
        const fixedPrice = Number(serviceForm.fixedPrice);
        if (!name || Number.isNaN(fixedPrice)) {
          return;
        }
        const newService = { id: createId(), name, fixedPrice };
        setServices((prev) => [...prev, newService]);
        setServiceForm({ name: "", fixedPrice: "" });
        setServiceFormOpen(false);
        setSelectedDynamicId(newService.id);
      }

      if (!me.isPrivileged) {
        return (
          <div className="cm-page">
            <div className="cm-wrap">
              <div className="cm-topbar">
                <h1>Economy Manager</h1>
                <a className="cm-btn" href="/character-manager">Back to Manager</a>
                <span className="cm-muted cm-right">{me.label}</span>
              </div>
              <p>Admin or moderator access required.</p>
            </div>
          </div>
        );
      }

      if (
        window.location.pathname.includes("/character-manager/economy-manager") ||
        window.location.pathname.startsWith("/economy-manager")
      ) {
        return <EconomyManagerPage />;
      }

      return (
        <div className="cm-page">
          <div className="cm-wrap">
            <div className="cm-topbar">
              <h1>Economy Manager</h1>
              <a className="cm-btn" href="/character-manager">Back to Manager</a>
              <span className="cm-muted cm-right">{me.label}</span>
            </div>

            <div className="cm-tabs">
              <button className={`cm-tab ${tab === "configure" ? "active" : ""}`} onClick={() => setTab("configure")}>
                Configure Economy
              </button>
              <button className={`cm-tab ${tab === "dynamic" ? "active" : ""}`} onClick={() => setTab("dynamic")}>
                Dynamic Item Price
              </button>
            </div>

            {tab === "configure" && (
              <div className="cm-economy-layout">
                <div className="cm-panel">
                  <h2>{entityForm.id ? "Update Entity" : "Create Entity"}</h2>
                  <form className="cm-field-grid" onSubmit={handleEntitySubmit}>
                    <label>
                      Name
                      <input
                        type="text"
                        value={entityForm.name}
                        onChange={(event) => setEntityForm((prev) => ({ ...prev, name: event.target.value }))}
                        placeholder="Entity name"
                      />
                    </label>
                    <label>
                      Type
                      <select
                        value={entityForm.type}
                        onChange={(event) => setEntityForm((prev) => ({ ...prev, type: event.target.value }))}
                      >
                        {ECONOMY_TYPES.map((entry) => (
                          <option key={entry} value={entry}>{entry}</option>
                        ))}
                      </select>
                    </label>
                    <label>
                      Value per Unit (Jelly)
                      <input
                        type="number"
                        value={entityForm.valuePerUnit}
                        onChange={(event) => setEntityForm((prev) => ({ ...prev, valuePerUnit: event.target.value }))}
                        placeholder="0"
                      />
                    </label>
                    <label>
                      Availability
                      <select
                        value={entityForm.availability}
                        onChange={(event) => setEntityForm((prev) => ({ ...prev, availability: event.target.value }))}
                      >
                        {AVAILABILITIES.map((entry) => (
                          <option key={entry} value={entry}>{entry}</option>
                        ))}
                      </select>
                    </label>
                    {entityError && <div className="cm-error">{entityError}</div>}
                    <div className="cm-row">
                      <button className="cm-btn cm-primary" type="submit">
                        {entityForm.id ? "Update Entity" : "Create Entity"}
                      </button>
                      {entityForm.id && (
                        <button className="cm-btn" type="button" onClick={resetEntityForm}>
                          Cancel
                        </button>
                      )}
                    </div>
                  </form>
                </div>

                <div className="cm-panel">
                  <h2>Existing Entities</h2>
                  {!entities.length && <p className="cm-muted">No entities yet.</p>}
                  {!!entities.length && (
                    <table className="cm-table">
                      <thead>
                        <tr>
                          <th>Name</th>
                          <th>Type</th>
                          <th>Value</th>
                          <th>Availability</th>
                          <th>Actions</th>
                        </tr>
                      </thead>
                      <tbody>
                        {entities.map((entity) => (
                          <tr key={entity.id}>
                            <td>{entity.name}</td>
                            <td>{entity.type}</td>
                            <td>{entity.valuePerUnit}</td>
                            <td>{entity.availability}</td>
                            <td className="cm-table-actions">
                              <button type="button" className="cm-btn" onClick={() => handleEntityEdit(entity)}>
                                Edit
                              </button>
                              <button type="button" className="cm-btn" onClick={() => handleEntityDelete(entity.id)}>
                                Delete
                              </button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  )}
                </div>
              </div>
            )}

            {tab === "dynamic" && (
              <div className="cm-economy-layout">
                <div className="cm-panel">
                  <h2>Items & Services</h2>
                  <div className="cm-field-grid">
                    <label>
                      Search
                      <input
                        type="text"
                        value={dynamicSearch}
                        onChange={(event) => setDynamicSearch(event.target.value)}
                        placeholder="Search by name"
                      />
                    </label>
                    <label>
                      Type
                      <select value={dynamicFilter} onChange={(event) => setDynamicFilter(event.target.value)}>
                        <option value="all">All</option>
                        <option value="Item">Items</option>
                        <option value="Service">Services</option>
                      </select>
                    </label>
                    <button type="button" className="cm-btn cm-primary" onClick={() => setServiceFormOpen((v) => !v)}>
                      {serviceFormOpen ? "Close Service Form" : "Create Service"}
                    </button>
                    {serviceFormOpen && (
                      <form className="cm-inline cm-service-form" onSubmit={handleCreateService}>
                        <input
                          type="text"
                          value={serviceForm.name}
                          placeholder="Service name"
                          onChange={(event) => setServiceForm((prev) => ({ ...prev, name: event.target.value }))}
                        />
                        <input
                          type="number"
                          value={serviceForm.fixedPrice}
                          placeholder="Fixed price"
                          onChange={(event) => setServiceForm((prev) => ({ ...prev, fixedPrice: event.target.value }))}
                        />
                        <button className="cm-btn cm-primary" type="submit">Add</button>
                      </form>
                    )}
                  </div>

                  <div className="cm-list">
                    {!filteredDynamicEntries.length && <p className="cm-muted">No matching items yet.</p>}
                    {filteredDynamicEntries.map((entry) => (
                      <button
                        key={entry.id}
                        type="button"
                        className={`cm-list-item ${selectedDynamicId === entry.id ? "active" : ""}`}
                        onClick={() => setSelectedDynamicId(entry.id)}
                      >
                        <div>
                          <strong>{entry.name}</strong>
                          <div className="cm-muted">{entry.type}</div>
                        </div>
                        <span className="cm-pill">{entry.fixedPrice} Jelly</span>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="cm-panel">
                  <h2>Dynamic Pricing</h2>
                  {!selectedEntry && <p className="cm-muted">Select an item or service to configure.</p>}
                  {selectedEntry && selectedMeta && (
                    <div className="cm-field-grid">
                      <div className="cm-inline cm-inline-space">
                        <div>
                          <strong>{selectedEntry.name}</strong>
                          <div className="cm-muted">{selectedEntry.type}</div>
                        </div>
                        <span className="cm-badge">Dynamic price: {dynamicPrice} Jelly</span>
                      </div>

                      <label>
                        Fixed Price (Jelly)
                        <input
                          type="number"
                          value={selectedEntry.fixedPrice}
                          onChange={(event) => handleFixedPriceChange(event.target.value)}
                        />
                      </label>

                      <label>
                        Availability
                        <select
                          value={effectiveAvailability}
                          onChange={(event) => updateSelectedMeta({ availability: event.target.value })}
                        >
                          {AVAILABILITIES.map((entry) => (
                            <option key={entry} value={entry}>{entry}</option>
                          ))}
                        </select>
                        <div className="cm-muted cm-subtle">
                          Suggested availability: {defaultAvailability} (from prerequisites)
                        </div>
                        {selectedMeta.availability && (
                          <button type="button" className="cm-btn" onClick={() => updateSelectedMeta({ availability: "" })}>
                            Use Suggested
                          </button>
                        )}
                      </label>

                      <label>
                        Markup (%)
                        <input
                          type="number"
                          value={effectiveMarkupPct}
                          onChange={(event) => updateSelectedMeta({ markupPct: event.target.value })}
                        />
                        <div className="cm-muted cm-subtle">Suggested markup: {defaultMarkupPct}%</div>
                        {selectedMeta.markupPct !== "" && (
                          <button type="button" className="cm-btn" onClick={() => updateSelectedMeta({ markupPct: "" })}>
                            Use Suggested
                          </button>
                        )}
                      </label>

                      <div className="cm-panel cm-panel-lite">
                        <div className="cm-inline cm-inline-space">
                          <strong>Requirements</strong>
                          <span className="cm-muted">Base cost: {requirementCost} Jelly</span>
                        </div>

                        <form className="cm-inline" onSubmit={handleRequirementAdd}>
                          <select
                            value={requirementDraft.entityId}
                            onChange={(event) => setRequirementDraft((prev) => ({ ...prev, entityId: event.target.value }))}
                          >
                            <option value="">-- Select requirement --</option>
                            {requirementOptions.map((entry) => (
                              <option key={entry.id} value={entry.id}>{entry.label}</option>
                            ))}
                          </select>
                          <input
                            type="number"
                            min="1"
                            value={requirementDraft.quantity}
                            onChange={(event) => setRequirementDraft((prev) => ({ ...prev, quantity: event.target.value }))}
                          />
                          <button className="cm-btn cm-primary" type="submit">Add</button>
                        </form>

                        {!selectedMeta.requirements.length && <p className="cm-muted">No requirements yet.</p>}
                        {!!selectedMeta.requirements.length && (
                          <div className="cm-list">
                            {selectedMeta.requirements.map((entry) => {
                              const info = requirementMap[entry.entityId];
                              return (
                                <div key={entry.entityId} className="cm-list-item cm-list-row">
                                  <div>
                                    <strong>{info?.label || "Unknown"}</strong>
                                    <div className="cm-muted">
                                      {info?.valuePerUnit || 0} Jelly per unit · {info?.availability || "n/a"}
                                    </div>
                                  </div>
                                  <div className="cm-inline">
                                    <span className="cm-pill">x {entry.quantity}</span>
                                    <button type="button" className="cm-btn" onClick={() => handleRequirementRemove(entry.entityId)}>
                                      Remove
                                    </button>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>

                      <div className="cm-panel cm-panel-lite">
                        <div className="cm-inline cm-inline-space">
                          <strong>Dynamic Price Breakdown</strong>
                          <span className="cm-badge">{dynamicPrice} Jelly</span>
                        </div>
                        <div className="cm-stack">
                          <div className="cm-inline cm-inline-space">
                            <span>Requirements cost</span>
                            <span>{requirementCost} Jelly</span>
                          </div>
                          <div className="cm-inline cm-inline-space">
                            <span>Markup ({effectiveMarkupPct}%)</span>
                            <span>{Math.round(markupValue)} Jelly</span>
                          </div>
                          <div className="cm-inline cm-inline-space">
                            <strong>Total</strong>
                            <strong>{dynamicPrice} Jelly</strong>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [me, setMe] = useState({
        label: "Checking login...",
        role: "",
        isAdmin: false,
        isPrivileged: false,
      });
      const [characters, setCharacters] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");

      const [menuOpen, setMenuOpen] = useState(false);
      const menuRef = useRef(null);

      const [quickOpen, setQuickOpen] = useState(false);
      const [quickBusy, setQuickBusy] = useState(false);
      const [quickStatus, setQuickStatus] = useState("");
      const [quickDataLoaded, setQuickDataLoaded] = useState(false);
      const [quickDataError, setQuickDataError] = useState("");
      const [quickData, setQuickData] = useState({
        archetypes: [],
        species: [],
        boons: [],
        weapons: [],
        armorBySlot: {},
      });

      const [quickForm, setQuickForm] = useState({
        name: "",
        level: 1,
        archetype: "",
        species: "",
        boon: "",
        nature: "",
        money: 0,
        armorQuality: "",
        weaponId: "",
        weaponQuality: "",
      });

      const loadCharacters = useCallback(async () => {
        const data = await api("/characters");
        setCharacters(data.characters || []);
      }, []);

      const init = useCallback(async () => {
        setLoading(true);
        setError("");
        try {
          const meData = await api("/auth/me");
          const role = meData.role || "";
          setMe({
            label: `${meData.username || "Unknown"} (${role || "user"})`,
            role,
            isAdmin: normalizeRole(role) === "admin",
            isPrivileged: isPrivilegedRole(role),
          });
        } catch (err) {
          setMe({ label: "Not logged in", role: "", isAdmin: false, isPrivileged: false });
        }
        try {
          await loadCharacters();
        } catch (err) {
          setError(err instanceof Error ? err.message : "Unable to load characters.");
        } finally {
          setLoading(false);
        }
      }, [loadCharacters]);

      useEffect(() => { init(); }, [init]);

      useEffect(() => {
        if (!menuOpen) return;
        const onDocClick = (event) => {
          if (!menuRef.current || !menuRef.current.contains(event.target)) setMenuOpen(false);
        };
        document.addEventListener("click", onDocClick);
        return () => document.removeEventListener("click", onDocClick);
      }, [menuOpen]);

      const ensureQuickData = useCallback(async () => {
        if (quickDataLoaded) return;
        setQuickDataError("");
        try {
          const [speciesRes, boonRes, archetypeRes, weaponsRes, equipmentRes] = await Promise.all([
            api("/abilities?source=Specie"),
            api("/abilities?source=Boon"),
            api("/archetypes"),
            api("/catalog/weapons?limit=200"),
            api("/catalog/equipment?limit=300"),
          ]);
          const armorBySlot = {};
          for (const item of (equipmentRes.equipment || [])) {
            const slot = String(item?.slot || "").trim().toLowerCase();
            if (ARMOR_SLOTS.includes(slot) && !armorBySlot[slot]) armorBySlot[slot] = item;
          }
          setQuickData({
            archetypes: sortByName(archetypeRes.archetypes),
            species: sortByName(speciesRes.abilities),
            boons: sortByName(boonRes.abilities),
            weapons: sortByName(weaponsRes.weapons),
            armorBySlot,
          });
          setQuickDataLoaded(true);
        } catch (err) {
          setQuickDataError(err instanceof Error ? err.message : "Failed to load quick-create data.");
        }
      }, [quickDataLoaded]);

      const openQuickModal = useCallback(async () => {
        setMenuOpen(false);
        setQuickStatus("");
        setQuickDataError("");
        await ensureQuickData();
        setQuickOpen(true);
      }, [ensureQuickData]);

      const onNewNormal = useCallback(async () => {
        setMenuOpen(false);
        const value = window.prompt("Character name?", "") || "";
        const name = value.trim() || "New Character";
        try {
          const res = await api("/characters", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ name }),
          });
          const cid = res.id || (res.character && res.character.id);
          if (!cid) throw new Error("Character creation failed.");
          window.location.href = characterManagerPath(cid, name);
        } catch (err) {
          setError(err instanceof Error ? err.message : "Unable to create character.");
        }
      }, []);

      const weaponLookup = useMemo(() => {
        const map = new Map();
        for (const weapon of quickData.weapons) map.set(weapon.id, weapon);
        return map;
      }, [quickData.weapons]);

      const onQuickCreate = useCallback(async (event) => {
        event.preventDefault();
        setQuickBusy(true);
        setQuickStatus("Preparing quick build...");
        try {
          const name = (quickForm.name || "").trim() || "New Character";
          const level = Math.max(1, Math.floor(Number(quickForm.level) || 1));
          const money = Math.max(0, Math.floor(Number(quickForm.money) || 0));
          const armorQuality = quickForm.armorQuality || "";
          const weaponId = quickForm.weaponId || "";
          const weaponQuality = quickForm.weaponQuality || armorQuality || "Adequate";
          const needsInventory = Boolean(money > 0 || armorQuality || weaponId);

          let inventoryId = "";
          if (needsInventory) {
            setQuickStatus("Creating inventory...");
            const invRes = await api("/inventories", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ name: `${name} Inventory`, currencies: { Jelly: money } }),
            });
            inventoryId = (invRes.inventory && invRes.inventory.id) || "";

            if (inventoryId && armorQuality) {
              for (const slot of ARMOR_SLOTS) {
                const entry = quickData.armorBySlot[slot];
                if (!entry || !entry.id) continue;
                setQuickStatus(`Adding ${entry.name || slot}...`);
                await api(`/inventories/${encodeURIComponent(inventoryId)}/purchase`, {
                  method: "POST",
                  headers: { "content-type": "application/json" },
                  body: JSON.stringify({
                    kind: "equipment",
                    ref_id: entry.id,
                    quantity: 1,
                    quality: armorQuality,
                    pricing_mode: "take",
                    equipped: true,
                  }),
                });
              }
            }

            if (inventoryId && weaponId) {
              const weapon = weaponLookup.get(weaponId);
              setQuickStatus(`Adding ${weapon?.name || "weapon"}...`);
              await api(`/inventories/${encodeURIComponent(inventoryId)}/purchase`, {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify({
                  kind: "weapon",
                  ref_id: weaponId,
                  quantity: 1,
                  quality: weaponQuality,
                  pricing_mode: "take",
                  equipped: true,
                }),
              });
            }
          }

          setQuickStatus("Creating character...");
          const created = await api("/characters", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ name }),
          });
          const cid = created.id || (created.character && created.character.id);
          if (!cid) throw new Error("Character creation failed.");

          const intensities = {};
          if (quickForm.nature) intensities[quickForm.nature] = 1;
          const abilities = [];
          if (quickForm.species) abilities.push(quickForm.species);
          if (quickForm.boon && !abilities.includes(quickForm.boon)) abilities.push(quickForm.boon);

          const updatePayload = {
            name,
            level,
            xp: 0,
            stats: {
              level,
              intensities,
              species_ability_id: quickForm.species || "",
              boon_ability_id: quickForm.boon || "",
            },
            abilities,
            archetype_id: quickForm.archetype || "",
            starting_money: money,
          };
          if (armorQuality || weaponId) {
            const startingGear = {};
            if (armorQuality) startingGear.armor = { quality: armorQuality, slots: [...ARMOR_SLOTS] };
            if (weaponId) startingGear.weapon = { ref_id: weaponId, quality: weaponQuality };
            updatePayload.starting_gear = startingGear;
          }
          if (inventoryId) updatePayload.inventory_id = inventoryId;

          setQuickStatus("Applying quick-build settings...");
          await api(`/characters/${encodeURIComponent(cid)}`, {
            method: "PUT",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(updatePayload),
          });

          window.location.href = characterManagerPath(cid, name);
        } catch (err) {
          setQuickStatus(`Quick create failed: ${err instanceof Error ? err.message : "Unknown error"}`);
        } finally {
          setQuickBusy(false);
        }
      }, [quickData.armorBySlot, quickForm, weaponLookup]);

      return (
        <div className="cm-page">
          <div className="cm-wrap">
            <div className="cm-topbar">
              <h1>New Character Manager</h1>
              <a className="cm-btn" href="portal.html">Portal</a>
              <span className="cm-muted cm-right">{me.label}</span>
            </div>

            <div className="cm-actions">
              <div className="cm-menu-wrap" ref={menuRef}>
                <button className="cm-btn cm-primary" onClick={() => setMenuOpen((v) => !v)}>+ New Character</button>
                <div className={`cm-menu ${menuOpen ? "open" : ""}`}>
                  <button type="button" onClick={onNewNormal}>Normal</button>
                  <button type="button" className="cm-primary-item" onClick={openQuickModal}>Quick Create</button>
                </div>
              </div>
              <span className="cm-muted">Click a card to open the character sheet.</span>
            </div>

            {error && <div className="cm-error">{error}</div>}
            {loading && <p className="cm-muted">Loading characters...</p>}
            {!loading && !characters.length && <p className="cm-muted">No characters yet. Create one to begin.</p>}

            <div className="cm-grid">
              {characters.map((character) => (
                <button
                  key={character.id}
                  className="cm-card"
                  onClick={() => {
                    window.location.href = characterManagerPath(character.id, character.name || character.id);
                  }}
                  type="button"
                >
                  <div className="cm-avatar">
                    <img
                      src={`/characters/${encodeURIComponent(character.id)}/avatar?ts=${Date.now()}`}
                      alt={`${character.name || "character"} avatar`}
                      onError={(event) => { event.currentTarget.src = FALLBACK_AVATAR; }}
                    />
                  </div>
                  <div className="cm-meta">
                    <strong>{character.name || "(unnamed)"}</strong>
                    <div className="cm-muted">ID: {character.id}</div>
                    <div className="cm-pill">Owner: {character.owner || "self"}</div>
                  </div>
                </button>
              ))}
            </div>
          </div>

          <div
            className={`cm-modal ${quickOpen ? "open" : ""}`}
            onClick={(event) => { if (event.target === event.currentTarget) setQuickOpen(false); }}
          >
            <div className="cm-modal-panel">
              <h2>Quick Create</h2>
              <p className="cm-muted">Create and preconfigure a character, then jump straight into the full sheet editor.</p>
              <form className="cm-field-grid" onSubmit={onQuickCreate}>
                <label>
                  Character Name
                  <input type="text" value={quickForm.name} onChange={(event) => setQuickForm((prev) => ({ ...prev, name: event.target.value }))} placeholder="New Character" />
                </label>
                <label>
                  Level
                  <input type="number" min="1" value={quickForm.level} onChange={(event) => setQuickForm((prev) => ({ ...prev, level: event.target.value }))} />
                </label>
                <label>
                  Archetype
                  <select value={quickForm.archetype} onChange={(event) => setQuickForm((prev) => ({ ...prev, archetype: event.target.value }))}>
                    <option value="">-- Select archetype --</option>
                    {quickData.archetypes.map((item) => <option key={item.id} value={item.id}>{item.name || item.id}</option>)}
                  </select>
                </label>
                <label>
                  Species
                  <select value={quickForm.species} onChange={(event) => setQuickForm((prev) => ({ ...prev, species: event.target.value }))}>
                    <option value="">-- Select species --</option>
                    {quickData.species.map((item) => <option key={item.id} value={item.id}>{item.name || item.id}</option>)}
                  </select>
                </label>
                <label>
                  Boon
                  <select value={quickForm.boon} onChange={(event) => setQuickForm((prev) => ({ ...prev, boon: event.target.value }))}>
                    <option value="">-- Select boon --</option>
                    {quickData.boons.map((item) => <option key={item.id} value={item.id}>{item.name || item.id}</option>)}
                  </select>
                </label>
                <label>
                  Starting Nature
                  <select value={quickForm.nature} onChange={(event) => setQuickForm((prev) => ({ ...prev, nature: event.target.value }))}>
                    <option value="">-- None --</option>
                    {NATURES.map((nature) => <option key={nature} value={nature}>{nature}</option>)}
                  </select>
                </label>
                <label>
                  Starting Money (Jelly)
                  <input type="number" min="0" value={quickForm.money} onChange={(event) => setQuickForm((prev) => ({ ...prev, money: event.target.value }))} />
                </label>
                <label>
                  Full Armor Quality
                  <select value={quickForm.armorQuality} onChange={(event) => setQuickForm((prev) => ({ ...prev, armorQuality: event.target.value }))}>
                    <option value="">None</option>
                    {QUALITY_ORDER.map((quality) => <option key={quality} value={quality}>{quality}</option>)}
                  </select>
                </label>
                <label>
                  Starting Weapon
                  <select value={quickForm.weaponId} onChange={(event) => setQuickForm((prev) => ({ ...prev, weaponId: event.target.value }))}>
                    <option value="">None</option>
                    {quickData.weapons.map((weapon) => <option key={weapon.id} value={weapon.id}>{weapon.name || weapon.id}</option>)}
                  </select>
                </label>
                <label>
                  Weapon Quality
                  <select value={quickForm.weaponQuality} onChange={(event) => setQuickForm((prev) => ({ ...prev, weaponQuality: event.target.value }))}>
                    <option value="">Same as armor</option>
                    {QUALITY_ORDER.map((quality) => <option key={quality} value={quality}>{quality}</option>)}
                  </select>
                </label>
                {quickDataError && <div className="cm-error">{quickDataError}</div>}
                {quickStatus && <div className="cm-muted">{quickStatus}</div>}
                <div className="cm-modal-actions">
                  <button type="button" className="cm-btn" onClick={() => setQuickOpen(false)} disabled={quickBusy}>Cancel</button>
                  <button type="submit" className="cm-btn cm-primary" disabled={quickBusy}>{quickBusy ? "Creating..." : "Create Character"}</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
